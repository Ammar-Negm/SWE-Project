<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WareLogix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">

  <div class="card p-5" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <h2 class="text-primary-custom fw-bold">⬡ WareLogix</h2>
      <p class="text-muted">Intelligent Fulfillment, Simplified.</p>
    </div>

    <!-- <form method="POST" action="process_login.php"> -->
    <form method="GET" action="#">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" required placeholder="user@warelogix.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="mb-4">
        <label for="role" class="form-label">Select Role</label>
        <select class="form-select" id="role" name="role">
          <option value="manager">Manager</option>
          <option value="staff">Floor Staff</option>
          <option value="supplier">Supplier</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" onclick="if(document.getElementById('role').textContent)">Sign In</button>
    </form>
  </div>

  <script>
    // Example of handling form submission (for demonstration purposes only)
    document.querySelector('form').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent actual form submission

      const role = document.getElementById('role').value;
      if (role === 'manager') {
        window.location.href = 'manager/dashboard.html';
      } else if (role === 'staff') {
        window.location.href = 'staff/dashboard.html';
      } else if (role === 'supplier') {
        window.location.href = 'supplier/dashboard.html';
      }
    });
  </script>

</body>
</html>
